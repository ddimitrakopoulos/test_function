# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core app to Azure Function App - func-coup-prd-we-cc

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: pwsh
        run: |
          pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          # Try to find a solution first, then a project file
          $proj = Get-ChildItem -Recurse -File -Filter *.sln -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $proj) { $proj = Get-ChildItem -Recurse -File -Filter *.csproj -ErrorAction SilentlyContinue | Select-Object -First 1 }

          # If not found, attempt to extract a zip (if present) and search inside it
          if (-not $proj) {
            $zip = Get-ChildItem -File -Filter *.zip -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($zip) {
              Write-Host "Found zip archive: $($zip.FullName). Extracting to ./extracted"
              $extractDir = Join-Path -Path $PWD -ChildPath 'extracted'
              if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
              Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force
              # search for project/solution inside extracted folder
              $proj = Get-ChildItem -Path $extractDir -Recurse -File -Filter *.sln -ErrorAction SilentlyContinue | Select-Object -First 1
              if (-not $proj) { $proj = Get-ChildItem -Path $extractDir -Recurse -File -Filter *.csproj -ErrorAction SilentlyContinue | Select-Object -First 1 }
            }
          }

          if (-not $proj) {
            Write-Error "No .sln or .csproj found under $PWD and no zip with a project was found. Set AZURE_FUNCTIONAPP_PACKAGE_PATH to your project folder."
            exit 1
          }

          Write-Host "Found project: $($proj.FullName)"
          # Publish a clean deployable folder and zip its contents for Kudu ZipDeploy
          if (Test-Path ./output) { Remove-Item -Recurse -Force ./output }
          if (Test-Path ./functionapp.zip) { Remove-Item -Force ./functionapp.zip }

          dotnet publish $proj.FullName --configuration Release --output ./output

          if (-not (Test-Path ./output/host.json)) {
            Write-Error "Publish output is missing host.json. Ensure host.json is included in the function project."
            exit 1
          }

          $dll = Get-ChildItem -Path ./output -File -Filter *.dll -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Publish output does not contain any .dll files."
            exit 1
          }

          Compress-Archive -Path ./output/* -DestinationPath ./functionapp.zip
          Write-Host "Created deployment package: $((Resolve-Path ./functionapp.zip).Path)"
          popd
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3B55FCA367604C28B194E34E0C3F469A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D38AF90FFED48AD9829915BB78A14E6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_71A0F113FAF048E08C8A3813214EEB26 }}

      - name: 'Run Azure Functions Action (Attempt 1)'
        uses: Azure/functions-action@v1
        id: fa_attempt_1
        continue-on-error: true
        with:
          app-name: 'func-coup-prd-we-cc'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/functionapp.zip'

      - name: 'Run Azure Functions Action (Attempt 2)'
        if: steps.fa_attempt_1.outcome == 'failure'
        uses: Azure/functions-action@v1
        id: fa_attempt_2
        with:
          app-name: 'func-coup-prd-we-cc'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/functionapp.zip'

      - name: 'Fail if Deployment Failed Twice'
        if: steps.fa_attempt_1.outcome == 'failure' && steps.fa_attempt_2.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Error "Deployment failed in both attempts. Review Kudu/ZipDeploy logs for details."
          exit 1
          