# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core app to Azure Function App - func-coup-prd-we-cc

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: pwsh
        run: |
          pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          # Try to find a solution first, then a project file
          $proj = Get-ChildItem -Recurse -File -Filter *.sln -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $proj) { $proj = Get-ChildItem -Recurse -File -Filter *.csproj -ErrorAction SilentlyContinue | Select-Object -First 1 }

          # If not found, attempt to extract a zip (if present) and search inside it
          if (-not $proj) {
            $zip = Get-ChildItem -File -Filter *.zip -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($zip) {
              Write-Host "Found zip archive: $($zip.FullName). Extracting to ./extracted"
              $extractDir = Join-Path -Path $PWD -ChildPath 'extracted'
              if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
              Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force
              # search for project/solution inside extracted folder
              $proj = Get-ChildItem -Path $extractDir -Recurse -File -Filter *.sln -ErrorAction SilentlyContinue | Select-Object -First 1
              if (-not $proj) { $proj = Get-ChildItem -Path $extractDir -Recurse -File -Filter *.csproj -ErrorAction SilentlyContinue | Select-Object -First 1 }
            }
          }

          if (-not $proj) {
            Write-Error "No .sln or .csproj found under $PWD and no zip with a project was found. Set AZURE_FUNCTIONAPP_PACKAGE_PATH to your project folder."
            exit 1
          }

          Write-Host "Found project: $($proj.FullName)"
          # Publish a clean deployable folder and zip its contents for Kudu ZipDeploy
          if (Test-Path ./output) { Remove-Item -Recurse -Force ./output }
          $stableZipPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath 'functionapp.zip'
          if (Test-Path $stableZipPath) { Remove-Item -Force $stableZipPath }

          dotnet publish $proj.FullName --configuration Release --output ./output

          if (-not (Test-Path ./output/host.json)) {
            Write-Error "Publish output is missing host.json. Ensure host.json is included in the function project."
            exit 1
          }

          $dll = Get-ChildItem -Path ./output -File -Filter *.dll -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Publish output does not contain any .dll files."
            exit 1
          }

          $publishFiles = Get-ChildItem -Path ./output -Recurse -File -ErrorAction SilentlyContinue
          if (-not $publishFiles) {
            Write-Error "Publish output folder is empty; cannot create deployment zip."
            exit 1
          }

          $archiveSource = Join-Path -Path (Resolve-Path ./output).Path -ChildPath '*'
          Compress-Archive -Path $archiveSource -DestinationPath $stableZipPath -Force

          if (-not (Test-Path $stableZipPath)) {
            Write-Error "Deployment zip was not created at $stableZipPath."
            exit 1
          }

          Write-Host "Created deployment package: $stableZipPath"
          popd
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3B55FCA367604C28B194E34E0C3F469A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D38AF90FFED48AD9829915BB78A14E6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_71A0F113FAF048E08C8A3813214EEB26 }}

      - name: 'Resolve Function App Resource Group'
        shell: pwsh
        run: |
          $rg = az functionapp show --name 'func-coup-prd-we-cc' --query resourceGroup -o tsv
          if (-not $rg) {
            Write-Error "Could not resolve resource group for function app func-coup-prd-we-cc."
            exit 1
          }
          Write-Host "Resolved resource group: $rg"
          "FUNCTIONAPP_RESOURCE_GROUP=$rg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 'Prepare Function App for Zip Deploy'
        shell: pwsh
        run: |
          az functionapp config appsettings set --name 'func-coup-prd-we-cc' --resource-group "$env:FUNCTIONAPP_RESOURCE_GROUP" --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false
          az functionapp restart --name 'func-coup-prd-we-cc' --resource-group "$env:FUNCTIONAPP_RESOURCE_GROUP"

      - name: 'Run Azure Functions Action (Attempt 1)'
        uses: Azure/functions-action@v1
        id: fa_attempt_1
        continue-on-error: true
        with:
          app-name: 'func-coup-prd-we-cc'
          slot-name: 'Production'
          package: '${{ github.workspace }}/functionapp.zip'

      - name: 'Run Azure Functions Action (Attempt 2)'
        if: steps.fa_attempt_1.outcome == 'failure'
        uses: Azure/functions-action@v1
        id: fa_attempt_2
        with:
          app-name: 'func-coup-prd-we-cc'
          slot-name: 'Production'
          package: '${{ github.workspace }}/functionapp.zip'

      - name: 'Fallback Deploy via Azure CLI ZipDeploy'
        if: steps.fa_attempt_1.outcome == 'failure' && steps.fa_attempt_2.outcome == 'failure'
        id: cli_zipdeploy
        continue-on-error: true
        shell: pwsh
        run: |
          $stableZipPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath 'functionapp.zip'
          az functionapp deployment source config-zip --name 'func-coup-prd-we-cc' --resource-group "$env:FUNCTIONAPP_RESOURCE_GROUP" --src $stableZipPath

      - name: 'Collect Kudu Diagnostics After Failed Deploy'
        if: steps.fa_attempt_1.outcome == 'failure' && steps.fa_attempt_2.outcome == 'failure' && steps.cli_zipdeploy.outcome == 'failure'
        shell: pwsh
        run: |
          $appName = 'func-coup-prd-we-cc'
          $rg = "$env:FUNCTIONAPP_RESOURCE_GROUP"

          Write-Host "--- Function App Runtime Summary ---"
          az functionapp show --name $appName --resource-group $rg --query "{name:name,state:state,kind:kind,enabledHostNames:enabledHostNames,linuxFxVersion:siteConfig.linuxFxVersion,netFrameworkVersion:siteConfig.netFrameworkVersion}" -o json

          Write-Host "--- Required App Settings Presence ---"
          $settings = az functionapp config appsettings list --name $appName --resource-group $rg | ConvertFrom-Json
          foreach ($key in @('AzureWebJobsStorage','FUNCTIONS_WORKER_RUNTIME','WEBSITE_RUN_FROM_PACKAGE')) {
            $exists = $null -ne ($settings | Where-Object { $_.name -eq $key } | Select-Object -First 1)
            $state = if ($exists) { 'present' } else { 'MISSING' }
            Write-Host "$key: $state"
          }

          Write-Host "--- Kudu Latest Deployment Logs ---"
          $scmHost = az functionapp show --name $appName --resource-group $rg --query "enabledHostNames[?contains(@, 'scm')]|[0]" -o tsv
          if (-not $scmHost) {
            Write-Host "SCM host not found; skipping Kudu log retrieval."
            exit 0
          }

          $profilesXml = az functionapp deployment list-publishing-profiles --name $appName --resource-group $rg --xml
          [xml]$profiles = $profilesXml
          $publishProfile = $profiles.publishData.publishProfile | Where-Object { $_.publishMethod -eq 'MSDeploy' } | Select-Object -First 1
          if (-not $publishProfile) {
            Write-Host "Publish profile not available; skipping Kudu log retrieval."
            exit 0
          }

          $basic = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$($publishProfile.userName):$($publishProfile.userPWD)"))
          $headers = @{ Authorization = "Basic $basic" }
          $base = "https://$scmHost"
          $deployments = Invoke-RestMethod -Method Get -Uri "$base/api/deployments" -Headers $headers
          $latest = $deployments | Select-Object -First 1
          if (-not $latest) {
            Write-Host "No Kudu deployment records found."
            exit 0
          }

          Write-Host "Latest deployment id: $($latest.id) status: $($latest.status)"
          $logs = Invoke-RestMethod -Method Get -Uri "$base/api/deployments/$($latest.id)/log" -Headers $headers
          $logs | Select-Object -First 100 | ForEach-Object {
            Write-Host "[$($_.type)] $($_.message)"
          }

      - name: 'Fail if Deployment Failed All Attempts'
        if: steps.fa_attempt_1.outcome == 'failure' && steps.fa_attempt_2.outcome == 'failure' && steps.cli_zipdeploy.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Error "Deployment failed in both functions-action attempts and Azure CLI fallback. Review diagnostics above."
          exit 1
